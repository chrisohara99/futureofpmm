<!DOCTYPE html>
<html lang="en">
<head>
<script src="/assets/js/auth-guard.js"></script>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum | The Future of PMM</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-slate: #44546A;
            --sap-orange: #ED7D31;
            --sap-blue: #4472C4;
            --text: #2B3A4A;
            --bg: #FAFAFA;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: var(--dark-slate);
            padding: 0.75rem 2rem;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .logo img { height: 135px; }
        .nav { display: flex; gap: 1.25rem; align-items: center; }
        .nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem; }
        .nav a:hover { color: white; }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }
        
        .message-box {
            text-align: center;
            max-width: 500px;
        }
        
        .message-box h1 {
            font-size: 2rem;
            color: var(--dark-slate);
            margin-bottom: 1rem;
        }
        
        .message-box p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
        }
        
        .message-box .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        
        .back-link {
            display: inline-block;
            color: var(--sap-blue);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .logo img { height: 70px !important; }
            .header { padding: 0.5rem 1rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">
            <img src="/assets/images/logo-white.svg" alt="Future of PMM">
        </a>
        <nav class="nav">
            <a href="/">Home</a>
            <a href="/digests/">Digests</a>
            <a href="/newsletters.html">Newsletter</a>
        </nav>
    </div>
</header>

<main>
    <div class="message-box">
        <div class="icon">🔧</div>
        <h1>Curriculum Under Revision</h1>
        <p>We're making updates to improve the learning experience. Check back soon.</p>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</main>

</body>
</html>
