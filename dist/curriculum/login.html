<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | SAP Data & Analytics Product Marketing</title>
    <meta name="description" content="Sign in to track your progress through the PMM curriculum.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-slate: #44546A;
            --sap-orange: #ED7D31;
            --sap-blue: #4472C4;
            --light-gray: #E7E6E6;
            --gold: #FFC000;
            --green: #70AD47;
            --text: #2B3A4A;
            --bg: #FAFAFA;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }
        
        .header {
            background: var(--dark-slate);
            padding: 1rem 2rem;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .logo img { height: 80px; }
        .logo-text { color: white; font-weight: 600; font-size: 1rem; }
        .nav { display: flex; gap: 1.25rem; align-items: center; }
        .nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem; }
        .nav a:hover { color: white; }
        .nav-btn {
            background: var(--sap-orange);
            color: white !important;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 500;
        }
        .nav-btn:hover { background: #d66a1f; }
        
        .hero {
            background: linear-gradient(135deg, var(--dark-slate) 0%, var(--sap-blue) 100%);
            padding: 3rem 2rem;
            color: white;
            text-align: center;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        main {
            max-width: 420px;
            margin: -2rem auto 3rem;
            padding: 0 1rem;
        }
        
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .login-card h2 {
            font-size: 1.3rem;
            color: var(--dark-slate);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            color: var(--dark-slate);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--light-gray);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--sap-blue);
        }
        
        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--sap-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover {
            background: var(--dark-slate);
        }
        .submit-btn:disabled {
            background: var(--light-gray);
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #999;
            font-size: 0.85rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--light-gray);
        }
        .divider span {
            padding: 0 1rem;
        }
        
        .signup-link {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }
        .signup-link a {
            color: var(--sap-blue);
            text-decoration: none;
            font-weight: 500;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #FFEBEE;
            color: #C62828;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        
        .footer {
            background: var(--dark-slate);
            color: white;
            padding: 2rem;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .footer p { opacity: 0.8; font-size: 0.9rem; }
        .footer a { color: var(--gold); }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">
            <img src="/assets/images/logo-white.svg" alt="Future of PMM">
        </a>
        <nav class="nav">
            <a href="/">Home</a>
            <a href="/curriculum/">Curriculum</a>
            <a href="/digests/">Digests</a>
            <a href="/newsletters.html">Newsletter</a>
            <a href="/curriculum/signup.html" class="nav-btn">Enroll</a>
        </nav>
    </div>
</header>

<section class="hero">
    <h1>Welcome Back</h1>
    <p>Sign in to continue your learning journey</p>
</section>

<main>
    <div class="login-card">
        <h2>Sign In</h2>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
        </form>
        
        <div class="divider"><span>or</span></div>
        
        <p class="signup-link">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
</main>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://yyqzkczutlidhgyiyawc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5cXprY3p1dGxpZGhneWl5YXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjY0NzksImV4cCI6MjA5MDA0MjQ3OX0.B4mHnxZ9Ap31e4w3uE4cW6cWZvKgiLnLOcmbNbeCoTI';

let supabaseClient = null;
if (typeof supabase !== 'undefined' && supabase.createClient) {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');
    
    // Check if already logged in
    if (supabaseClient) {
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = '/curriculum/';
            }
        });
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';
        errorMessage.classList.remove('show');
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        try {
            if (supabaseClient) {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Store user info locally
                if (data.user) {
                    localStorage.setItem('pmmCurrentUser', JSON.stringify({
                        id: data.user.id,
                        email: data.user.email,
                        firstName: data.user.user_metadata?.first_name || '',
                        lastName: data.user.user_metadata?.last_name || ''
                    }));
                }
                
                // Redirect to curriculum
                window.location.href = '/curriculum/';
            } else {
                // Fallback: check localStorage
                const users = JSON.parse(localStorage.getItem('pmmUsers') || '[]');
                const user = users.find(u => u.email === email && u.password === password);
                if (!user) throw new Error('Invalid email or password');
                localStorage.setItem('pmmCurrentUser', JSON.stringify(user));
                window.location.href = '/curriculum/';
            }
        } catch (error) {
            errorMessage.textContent = error.message || 'Invalid email or password';
            errorMessage.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
        }
    });
});
</script>

</body>
</html>
